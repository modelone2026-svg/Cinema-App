name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # أو اسم الفرع الرئيسي الخاص بك

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # المجلد الذي يتم إنتاجه بعد بناء المشروع
          branch: gh-pages # الفرع المخصص لاستضافة الصفحات
